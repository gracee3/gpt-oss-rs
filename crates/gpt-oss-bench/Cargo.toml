[package]
name = "gpt-oss-bench"
version.workspace = true
edition.workspace = true

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
gpt-oss-config.workspace = true
gpt-oss-core.workspace = true
gpt-oss-engine = { workspace = true, optional = true }

[features]
default = []
cuda = ["dep:gpt-oss-engine", "gpt-oss-engine/cuda"]
cublaslt = ["cuda", "gpt-oss-engine/cublaslt"]

[dev-dependencies]
criterion.workspace = true
rayon.workspace = true
rand.workspace = true
rand_chacha.workspace = true

[[bench]]
name = "sampling_bench"
harness = false
