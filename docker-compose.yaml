services:
  gpt-oss-rs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "9090:9090"
    volumes:
      - ${MODEL_PATH:-./models}:/models
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - RUST_LOG=info
      - CUDA_VISIBLE_DEVICES=0
    command: ["serve", "--model", "${MODEL_NAME:-openai/gpt-oss-20b}", "--gpu-memory-utilization", "0.90"]

volumes:
  huggingface-cache:
